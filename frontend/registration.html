<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | AfriSafe AI</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="css/animations.css">

    <link rel="stylesheet" href="css/registration.css">

</head>

<body>

<div class="background-elements"></div>

<div class="login-container">

    <!-- LEFT SIDE -->

    <div class="login-left">

        <!-- Copy EXACTLY the same content from login.html -->

    </div>

    <!-- RIGHT SIDE -->

    <div class="login-right">

        <div class="glass-card">

            <div class="card-header">

                <h2>Create Account</h2>

                <p>
                    Register to continue using
                    <strong>AfriSafe AI</strong>
                </p>

            </div>

            <form id="registerForm" class="auth-form">

    <!-- Full Name -->

    <div class="input-group">

        <label for="full_name">Full Name</label>

        <div class="input-wrapper">

            <input
                type="text"
                id="full_name"
                class="form-control"
                placeholder="Enter your full name"
                required>

        </div>

    </div>

    <!-- Email -->

    <div class="input-group">

        <label for="email">Email Address</label>

        <div class="input-wrapper">

            <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Enter your email"
                required>

        </div>

    </div>

    <!-- Age + Gender -->

    <div class="form-row">

        <div class="input-group">

            <label for="age">Age</label>

            <input
                type="number"
                id="age"
                class="form-control"
                min="1"
                max="120"
                required>

        </div>

        <div class="input-group">

            <label for="gender">Gender</label>

            <select
                id="gender"
                class="form-control"
                required>

                <option value="">Select</option>

                <option value="Male">Male</option>

                <option value="Female">Female</option>

                <option value="Other">Other</option>

            </select>

        </div>

    </div>

    <!-- State -->

    <div class="input-group">

        <label for="state">State</label>

        <input
            type="text"
            id="state"
            class="form-control"
            placeholder="State"
            required>

    </div>

    <!-- LGA -->

    <div class="input-group">

        <label for="lga">LGA</label>

        <input
            type="text"
            id="lga"
            class="form-control"
            placeholder="Local Government Area">

    </div>

    <!-- Password -->

    <div class="input-group">

        <label for="password">Password</label>

        <div class="input-wrapper">

            <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Create password"
                required>

            <button
                type="button"
                id="togglePassword"
                class="password-toggle">

                👁

            </button>

        </div>

    </div>

    <!-- Confirm Password -->

    <div class="input-group">

        <label for="confirm_password">Confirm Password</label>

        <div class="input-wrapper">

            <input
                type="password"
                id="confirm_password"
                class="form-control"
                placeholder="Confirm password"
                required>

            <button
                type="button"
                id="toggleConfirmPassword"
                class="password-toggle">

                👁

            </button>

        </div>

    </div>

    <!-- Terms -->

    <div class="remember-row">

        <label>

            <input
                type="checkbox"
                id="agreeTerms"
                required>

            I agree to the
            <a href="#">Terms & Conditions</a>

        </label>

    </div>

    <!-- Alert -->

    <div
        id="formAlert"
        class="form-alert">

    </div>

    <!-- Submit -->

    <button
        type="submit"
        id="registerBtn"
        class="btn btn-primary ripple-btn">

        <span class="btn-text">

            Create Account

        </span>

    </button>

</form>

<div class="divider">

    <span>OR</span>

</div>

<div class="alt-actions">

    <p>

        Already have an account?

        <a href="login.html">

            Sign In

        </a>

    </p>

</div>

        </div>

    </div>

</div>

<script src="js/registration.js"></script>

</body>

</html>
